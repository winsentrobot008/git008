<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawWork Demo - Render + DeepSeek</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  /* ===== Container ===== */
  .container {
    max-width: 900px;
    width: 100%;
  }

  /* ===== Header ===== */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% center; }
    50% { background-position: 200% center; }
  }
  header p {
    color: #a0a0b8;
    margin-top: 0.5rem;
    font-size: 0.95rem;
  }
  .status-badge {
    display: inline-block;
    margin-top: 0.75rem;
    padding: 0.3rem 1rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .status-badge.online {
    background: rgba(0, 200, 83, 0.15);
    color: #00c853;
    border: 1px solid rgba(0, 200, 83, 0.3);
  }
  .status-badge.offline {
    background: rgba(255, 82, 82, 0.15);
    color: #ff5252;
    border: 1px solid rgba(255, 82, 82, 0.3);
  }
  .status-badge.checking {
    background: rgba(255, 193, 7, 0.15);
    color: #ffc107;
    border: 1px solid rgba(255, 193, 7, 0.3);
  }

  /* ===== Card ===== */
  .card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .card:hover {
    border-color: rgba(0, 210, 255, 0.2);
    box-shadow: 0 0 30px rgba(0, 210, 255, 0.05);
  }
  .card h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: #b0b0d0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .card h2 .icon { font-size: 1.3rem; }

  /* ===== Input Area ===== */
  .input-group {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .input-group input {
    flex: 1;
    min-width: 200px;
    padding: 0.75rem 1rem;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.06);
    color: #e0e0e0;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.3s;
  }
  .input-group input:focus {
    border-color: #3a7bd5;
    box-shadow: 0 0 0 3px rgba(58, 123, 213, 0.15);
  }
  .input-group input::placeholder { color: #6a6a8a; }

  .btn {
    padding: 0.75rem 1.5rem;
    border-radius: 10px;
    border: none;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .btn-primary {
    background: linear-gradient(135deg, #3a7bd5, #00d2ff);
    color: #fff;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 210, 255, 0.3);
  }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }
  .btn-secondary {
    background: rgba(255, 255, 255, 0.08);
    color: #c0c0d8;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.12);
  }

  /* ===== Result Area ===== */
  .result-area {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.2);
    min-height: 60px;
    font-size: 0.9rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
    display: none;
  }
  .result-area.visible { display: block; }
  .result-area.loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    color: #a0a0b8;
  }
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-top-color: #00d2ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-area.error {
    border-left: 3px solid #ff5252;
    color: #ff8a80;
  }
  .result-area.success {
    border-left: 3px solid #00c853;
    color: #b9f6ca;
  }

  /* ===== Agent Grid ===== */
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
  }
  .agent-card {
    background: rgba(255, 255, 255, 0.04);
    border-radius: 12px;
    padding: 1rem;
    border: 1px solid rgba(255, 255, 255, 0.06);
    transition: all 0.3s;
  }
  .agent-card:hover {
    background: rgba(255, 255, 255, 0.07);
    transform: translateY(-2px);
  }
  .agent-card .name {
    font-weight: 600;
    font-size: 0.95rem;
    margin-bottom: 0.4rem;
  }
  .agent-card .balance {
    font-size: 1.3rem;
    font-weight: 700;
    color: #00d2ff;
  }
  .agent-card .meta {
    font-size: 0.75rem;
    color: #7a7a9a;
    margin-top: 0.3rem;
  }
  .agent-card .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 0.3rem;
  }
  .status-dot.alive { background: #00c853; }
  .status-dot.bankrupt { background: #ff5252; }
  .status-dot.unknown { background: #7a7a9a; }

  /* ===== Stats Row ===== */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .stat-item {
    text-align: center;
    padding: 0.75rem;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 10px;
  }
  .stat-item .value {
    font-size: 1.4rem;
    font-weight: 700;
    color: #00d2ff;
  }
  .stat-item .label {
    font-size: 0.7rem;
    color: #7a7a9a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 0.2rem;
  }

  /* ===== Footer ===== */
  footer {
    margin-top: 3rem;
    text-align: center;
    color: #5a5a7a;
    font-size: 0.8rem;
  }
  footer a { color: #3a7bd5; text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    body { padding: 1rem 0.75rem; }
    header h1 { font-size: 1.6rem; }
    .card { padding: 1rem; }
    .agent-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <h1>⚡ ClawWork Demo</h1>
    <p>Render + DeepSeek API · 轻量化部署</p>
    <span id="statusBadge" class="status-badge checking">⏳ 检查连接中...</span>
  </header>

  <!-- Stats Overview -->
  <div class="card">
    <h2><span class="icon">📊</span> 服务概览</h2>
    <div class="stats-row">
      <div class="stat-item">
        <div class="value" id="statAgents">-</div>
        <div class="label">Agent 数量</div>
      </div>
      <div class="stat-item">
        <div class="value" id="statTasks">-</div>
        <div class="label">总任务数</div>
      </div>
      <div class="stat-item">
        <div class="value" id="statBalance">-</div>
        <div class="label">总余额 ($)</div>
      </div>
      <div class="stat-item">
        <div class="value" id="statIncome">-</div>
        <div class="label">总收入 ($)</div>
      </div>
    </div>
  </div>

  <!-- Task Input -->
  <div class="card">
    <h2><span class="icon">🎯</span> 提交任务</h2>
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="输入任务描述，例如：写一份关于 AI 趋势的报告..." />
      <button class="btn btn-primary" id="submitBtn" onclick="submitTask()">🚀 提交</button>
    </div>
    <div id="resultArea" class="result-area"></div>
  </div>

  <!-- Agents -->
  <div class="card">
    <h2><span class="icon">🤖</span> Agent 列表</h2>
    <div id="agentList" class="agent-grid">
      <div style="grid-column:1/-1; text-align:center; color:#7a7a9a; padding:2rem 0;">
        <div class="spinner" style="margin:0 auto 0.5rem;"></div>
        加载中...
      </div>
    </div>
  </div>

  <!-- API Info -->
  <div class="card">
    <h2><span class="icon">🔗</span> API 端点</h2>
    <div style="font-size:0.85rem; line-height:1.8; color:#a0a0b8;">
      <div><code style="background:rgba(255,255,255,0.06); padding:0.15rem 0.4rem; border-radius:4px;">GET /api/agents</code> — 获取所有 Agent</div>
      <div><code style="background:rgba(255,255,255,0.06); padding:0.15rem 0.4rem; border-radius:4px;">GET /api/agents/{name}</code> — Agent 详情</div>
      <div><code style="background:rgba(255,255,255,0.06); padding:0.15rem 0.4rem; border-radius:4px;">GET /api/leaderboard</code> — 排行榜</div>
      <div><code style="background:rgba(255,255,255,0.06); padding:0.15rem 0.4rem; border-radius:4px;">GET /api/artifacts/random</code> — 随机作品</div>
    </div>
  </div>

  <footer>
    ClawWork · <a href="#" onclick="document.getElementById('apiUrlInput').style.display='block'; return false;">修改 API 地址</a>
    <div id="apiUrlInput" style="display:none; margin-top:0.5rem;">
      <input type="text" id="apiUrlField" value="" placeholder="https://your-app.onrender.com"
             style="padding:0.4rem 0.75rem; border-radius:8px; border:1px solid rgba(255,255,255,0.12);
                    background:rgba(255,255,255,0.06); color:#e0e0e0; font-size:0.85rem; width:300px; max-width:100%;" />
      <button class="btn btn-secondary" style="padding:0.4rem 0.75rem; font-size:0.85rem; margin-top:0.3rem;" onclick="updateApiUrl()">更新</button>
    </div>
  </footer>
</div>

<script>
// ===== Configuration =====
// 自动获取当前域名（Hugging Face / Render 同源部署）
const API_BASE = window.location.origin;
// WebSocket 地址（自动适配 wss:// 或 ws://）
const WS_URL = `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}/ws`;

// 也支持通过 localStorage 覆盖（例如调试时指向其他地址）
let API_BASE_OVERRIDE = localStorage.getItem('clawwork_api_base');
if (API_BASE_OVERRIDE) {
  API_BASE = API_BASE_OVERRIDE;
}

// 初始化 API URL 输入框
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('apiUrlField').value = API_BASE;
});

function updateApiUrl() {
  const url = document.getElementById('apiUrlField').value.trim().replace(/\/+$/, '');
  if (url) {
    API_BASE = url;
    localStorage.setItem('clawwork_api_base', url);
    document.getElementById('apiUrlInput').style.display = 'none';
    checkConnection();
    loadData();
  }
}

// ===== API Helper =====
async function apiGet(path) {
  const url = `${API_BASE}${path}`;
  const res = await fetch(url, {
    headers: { 'Accept': 'application/json' },
    signal: AbortSignal.timeout(10000)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  return res.json();
}

// ===== WebSocket Connection =====
let ws = null;
function connectWebSocket() {
  try {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => console.log('✅ WebSocket 已连接');
    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        console.log('📡 WebSocket 消息:', data);
        // 收到更新时自动刷新数据
        if (data.type === 'balance_update' || data.type === 'activity_update') {
          loadData();
        }
      } catch (e) {
        console.warn('WebSocket 消息解析失败:', e);
      }
    };
    ws.onclose = () => {
      console.log('🔌 WebSocket 已断开，5秒后重连...');
      setTimeout(connectWebSocket, 5000);
    };
    ws.onerror = (err) => console.error('❌ WebSocket 错误:', err);
  } catch (e) {
    console.warn('WebSocket 连接失败，5秒后重试:', e);
    setTimeout(connectWebSocket, 5000);
  }
}

// ===== Connection Check =====
async function checkConnection() {
  const badge = document.getElementById('statusBadge');
  badge.className = 'status-badge checking';
  badge.textContent = '⏳ 检查连接中...';
  try {
    const data = await apiGet('/api/health');
    badge.className = 'status-badge online';
    badge.textContent = `✅ 已连接 · ${window.location.host}`;
    return true;
  } catch (e) {
    badge.className = 'status-badge offline';
    badge.textContent = `❌ 无法连接 (${e.message})`;
    return false;
  }
}

// ===== Load Data =====
async function loadData() {
  try {
    // Load agents
    const agentsData = await apiGet('/api/agents');
    const agents = agentsData.agents || [];
    renderAgents(agents);

    // Calculate stats
    const totalAgents = agents.length;
    const totalBalance = agents.reduce((s, a) => s + (a.balance || 0), 0);
    const totalIncome = agents.reduce((s, a) => s + (a.total_token_cost || 0), 0);
    const totalTasks = agents.reduce((s, a) => s + (a.num_tasks || 0), 0);

    document.getElementById('statAgents').textContent = totalAgents;
    document.getElementById('statTasks').textContent = totalTasks;
    document.getElementById('statBalance').textContent = totalBalance.toFixed(2);
    document.getElementById('statIncome').textContent = totalIncome.toFixed(2);

  } catch (e) {
    document.getElementById('agentList').innerHTML =
      `<div style="grid-column:1/-1; text-align:center; color:#ff8a80; padding:2rem 0;">
        ❌ 加载失败: ${e.message}
      </div>`;
  }
}

// ===== Render Agents =====
function renderAgents(agents) {
  const container = document.getElementById('agentList');
  if (!agents.length) {
    container.innerHTML =
      `<div style="grid-column:1/-1; text-align:center; color:#7a7a9a; padding:2rem 0;">
        🤷 暂无 Agent 数据
      </div>`;
    return;
  }

  container.innerHTML = agents.map(a => {
    const status = (a.survival_status || 'unknown').toLowerCase();
    const dotClass = status === 'alive' ? 'alive' : status === 'bankrupt' ? 'bankrupt' : 'unknown';
    return `
      <div class="agent-card">
        <div class="name">${a.signature}</div>
        <div class="balance">$${(a.balance || 0).toFixed(2)}</div>
        <div class="meta">
          <span class="status-dot ${dotClass}"></span>${a.survival_status || 'Unknown'}
          ${a.current_date ? ` · ${a.current_date}` : ''}
        </div>
        <div class="meta">💰 成本: $${(a.total_token_cost || 0).toFixed(2)}</div>
      </div>
    `;
  }).join('');
}

// ===== Submit Task =====
async function submitTask() {
  const input = document.getElementById('taskInput');
  const task = input.value.trim();
  const resultArea = document.getElementById('resultArea');
  const btn = document.getElementById('submitBtn');

  if (!task) {
    resultArea.className = 'result-area visible error';
    resultArea.textContent = '⚠️ 请输入任务描述';
    return;
  }

  // Show loading
  btn.disabled = true;
  resultArea.className = 'result-area visible loading';
  resultArea.innerHTML = '<div class="spinner"></div> 正在调用 DeepSeek API 处理任务...';

  try {
    // 调用 Render 上的 API - 这里我们调用 /api/agents 来模拟
    // 实际项目中你可以添加一个 POST /api/tasks 端点
    // 这里我们模拟一个调用过程，展示与 Render 服务的交互
    const startTime = Date.now();

    // 先检查服务是否在线
    const healthData = await apiGet('/api/health');
    const agentsData = await apiGet('/api/agents');

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

    // 构建漂亮的响应展示
    const agentCount = agentsData.agents?.length || 0;
    const totalBalance = agentsData.agents?.reduce((s, a) => s + (a.balance || 0), 0) || 0;

    resultArea.className = 'result-area visible success';
    resultArea.innerHTML = `
✅ <strong>任务已提交至 DeepSeek API</strong> (${elapsed}s)

📝 <strong>任务描述:</strong> ${task}

📡 <strong>服务状态:</strong> 在线 (${API_BASE})
🤖 <strong>在线 Agent:</strong> ${agentCount} 个
💰 <strong>总余额:</strong> $${totalBalance.toFixed(2)}

<hr style="border-color:rgba(255,255,255,0.08); margin:0.75rem 0;">

<em style="color:#7a7a9a;">
💡 提示: 实际生产环境中，你可以添加一个 POST /api/tasks 端点，
将任务发送到后端，由 LiveAgent 调用 DeepSeek API 执行。
当前 Demo 展示了前端与 Render 部署的 API 服务的连通性。
</em>
    `;
  } catch (e) {
    resultArea.className = 'result-area visible error';
    resultArea.textContent = `❌ 调用失败: ${e.message}\n\n请确认 Render 服务地址是否正确。`;
  } finally {
    btn.disabled = false;
  }
}

// ===== Init =====
(async function init() {
  const connected = await checkConnection();
  if (connected) {
    await loadData();
  }
})();
</script>
</body>
</html>
