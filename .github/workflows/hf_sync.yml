name: Sync to Hugging Face

on:
  push:
    branches: ['*']

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf "https://winsentrobot008:$HF_TOKEN@huggingface.co/spaces/winsentrobot008/git008"
          git push hf master --force