name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

  # 允许手动触发
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          git remote add hf "https://aoogoost:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}"
          git push -f hf main:master
