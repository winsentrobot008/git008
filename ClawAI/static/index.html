<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveBench Dashboard - AI Agent Economy Simulator</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-secondary: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --purple: #bc8cff;
    --orange: #f0883e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header h1 span { color: var(--accent); }
  .header .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-secondary);
  }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }
  .status-dot.error { background: var(--red); }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* Stats Grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.accent { color: var(--accent); }
  .stat-card .value.orange { color: var(--orange); }
  .stat-card .value.purple { color: var(--purple); }
  .stat-card .value.red { color: var(--red); }

  /* Leaderboard Table */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-header h2 { font-size: 16px; font-weight: 600; }
  .card-header .badge {
    background: rgba(88,166,255,0.1);
    color: var(--accent);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
  }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  th { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  td { font-size: 14px; }
  tr:hover { background: rgba(255,255,255,0.02); }
  .survival-thriving { color: var(--green); }
  .survival-stable { color: var(--accent); }
  .survival-struggling { color: var(--yellow); }
  .survival-bankrupt { color: var(--red); }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .tab-btn {
    padding: 12px 20px;
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; padding: 20px; }
  .tab-content.active { display: block; }

  /* Agent Detail */
  .agent-detail-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    display: none;
    overflow-y: auto;
  }
  .agent-detail-overlay.open { display: block; }
  .agent-detail-panel {
    max-width: 1200px;
    margin: 40px auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    position: relative;
  }
  .close-btn {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .close-btn:hover { background: var(--border); color: var(--text); }
  .detail-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }
  .detail-header h2 { font-size: 24px; margin-bottom: 8px; }
  .detail-header .status-row { display: flex; gap: 24px; flex-wrap: wrap; }
  .detail-header .status-row span { font-size: 14px; color: var(--text-secondary); }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 20px;
  }
  @media (max-width: 768px) {
    .detail-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Charts (CSS-based simple bars) */
  .chart-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .chart-container h3 { font-size: 14px; margin-bottom: 16px; color: var(--text-secondary); }
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; }
  .bar {
    flex: 1;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    transition: height 0.3s;
    position: relative;
  }
  .bar:hover { opacity: 0.8; }
  .bar-tooltip {
    display: none;
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    color: #fff;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    white-space: nowrap;
  }
  .bar:hover .bar-tooltip { display: block; }

  /* Tasks list */
  .task-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item .task-info { flex: 1; }
  .task-item .task-title { font-size: 14px; margin-bottom: 4px; }
  .task-item .task-meta { font-size: 12px; color: var(--text-secondary); }
  .task-item .task-status { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
  .task-status.completed { background: rgba(63,185,80,0.1); color: var(--green); }
  .task-status.pending { background: rgba(210,153,34,0.1); color: var(--yellow); }

  /* Activity log */
  .log-entry {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .log-entry:last-child { border-bottom: none; }

  /* WebSocket status indicator */
  .ws-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    background: rgba(63,185,80,0.1);
    color: var(--green);
  }
  .ws-indicator.disconnected {
    background: rgba(248,81,73,0.1);
    color: var(--red);
  }

  .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
  .error-message { padding: 20px; color: var(--red); text-align: center; }

  /* Action buttons */
  .btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.05); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; }
</style>
</head>
<body>

<div class="header">
  <h1>🎮 <span>LiveBench</span> Dashboard</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="depth-selector" style="display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 8px;">
      <span style="font-size:13px;color:var(--text-secondary);">🧩 拆解层级</span>
      <button class="depth-btn" id="depthBtn2" onclick="setDepth(2)" style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text-secondary);cursor:pointer;font-size:13px;transition:all 0.2s;">2层</button>
      <button class="depth-btn active-depth" id="depthBtn5" onclick="setDepth(5)" style="padding:4px 12px;border:1px solid var(--accent);border-radius:4px;background:rgba(88,166,255,0.15);color:var(--accent);cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;">5层</button>
    </div>
    <div class="ws-indicator" id="wsIndicator">● 实时连接</div>
    <div class="status">
      <span class="status-dot" id="apiStatusDot"></span>
      <span id="apiStatusText">检查中...</span>
    </div>
  </div>
</div>

<div class="container">

<!-- Stats -->
<div class="stats-grid" id="statsGrid">
  <div class="stat-card">
    <div class="label">活跃 Agent</div>
    <div class="value accent" id="agentCount">--</div>
  </div>
  <div class="stat-card">
    <div class="label">总余额</div>
    <div class="value green" id="totalBalance">--</div>
  </div>
  <div class="stat-card">
    <div class="label">总 Token 成本</div>
    <div class="value orange" id="totalTokenCost">--</div>
  </div>
  <div class="stat-card">
    <div class="label">任务池</div>
    <div class="value purple" id="taskPoolSize">--</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab(this, 'leaderboard')">🏆 排行榜</button>
  <button class="tab-btn" onclick="switchTab(this, 'task-submit')">📋 提交任务</button>
  <button class="tab-btn" onclick="switchTab(this, 'tasks')">📝 所有任务</button>
  <button class="tab-btn" onclick="switchTab(this, 'artifacts')">📎 作品展示</button>
  <button class="tab-btn" onclick="switchTab(this, 'stream')">📡 实时流</button>
</div>

<!-- Leaderboard Tab -->
<div class="tab-content active" id="tab-leaderboard">
  <div class="card">
    <div class="card-header">
      <h2>Agent 排行榜</h2>
      <span class="badge" id="agentCountBadge">0 agents</span>
    </div>
    <div id="leaderboardContent">
      <div class="loading">加载中...</div>
    </div>
  </div>
</div>

<!-- Task Submit Tab -->
<div class="tab-content" id="tab-task-submit">
  <div class="card">
    <div class="card-header"><h2>提交新任务</h2></div>
    <div style="padding:20px;">
      <div style="margin-bottom:16px;">
        <label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px;">任务描述</label>
        <textarea id="taskPrompt" rows="4" style="width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;resize:vertical;" placeholder="例如：搞个3D投掷游戏"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;">
        <div>
          <label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px;">Agent（可选）</label>
          <input id="taskAgent" type="text" style="width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;" placeholder="留空自动分配">
        </div>
        <div>
          <label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px;">职业</label>
          <input id="taskOccupation" type="text" style="width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;" value="Software Engineer">
        </div>
        <div>
          <label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px;">最大支付</label>
          <input id="taskMaxPayment" type="number" style="width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;" value="50">
        </div>
      </div>
      <button class="btn btn-primary" onclick="submitTask()">🚀 提交任务</button>
      <div id="taskResult" style="margin-top:16px;display:none;"></div>
    </div>
  </div>
</div>

<!-- Tasks Tab -->
<div class="tab-content" id="tab-tasks">
  <div class="card">
    <div class="card-header">
      <h2>所有任务</h2>
      <span class="badge" id="taskCountBadge">0</span>
    </div>
    <div id="tasksContent"><div class="loading">加载中...</div></div>
  </div>
</div>

<!-- Artifacts Tab -->
<div class="tab-content" id="tab-artifacts">
  <div class="card">
    <div class="card-header">
      <h2>随机作品展示</h2>
      <button class="btn" onclick="loadArtifacts()">🔄 刷新</button>
    </div>
    <div id="artifactsContent"><div class="loading">加载中...</div></div>
  </div>
</div>

<!-- Stream Tab -->
<div class="tab-content" id="tab-stream">
  <div class="card">
    <div class="card-header">
      <h2>实时活动流</h2>
      <span class="ws-indicator" id="wsTabIndicator">● WebSocket</span>
    </div>
    <div id="streamContent" style="max-height:600px;overflow-y:auto;">
      <div class="loading">等待连接...</div>
    </div>
  </div>
</div>

</div>

<!-- Agent Detail Modal -->
<div class="agent-detail-overlay" id="agentDetailOverlay">
  <div class="agent-detail-panel">
    <button class="close-btn" onclick="closeAgentDetail()">✕</button>
    <div class="detail-header" id="detailHeader">
      <h2 id="detailName">Agent</h2>
      <div class="status-row" id="detailStatusRow"></div>
    </div>
    <div class="tabs" id="detailTabs">
      <button class="tab-btn active" onclick="switchDetailTab(this, 'overview')">概览</button>
      <button class="tab-btn" onclick="switchDetailTab(this, 'tasks')">任务</button>
      <button class="tab-btn" onclick="switchDetailTab(this, 'economic')">经济</button>
      <button class="tab-btn" onclick="switchDetailTab(this, 'learning')">记忆</button>
    </div>
    <div id="detailContent" style="min-height:200px;">
      <div class="tab-content active" id="detail-tab-overview"><div class="loading">加载中...</div></div>
      <div class="tab-content" id="detail-tab-tasks"><div class="loading">加载中...</div></div>
      <div class="tab-content" id="detail-tab-economic"><div class="loading">加载中...</div></div>
      <div class="tab-content" id="detail-tab-learning"><div class="loading">加载中...</div></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// Helper
// ============================================================
const API_BASE = window.location.origin;
const WS_BASE = API_BASE.replace(/^http/, 'ws');

function $(id) { return document.getElementById(id); }

function formatCurrency(v) {
  if (v === null || v === undefined) return '--';
  return '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function shortSig(sig) { return sig.length > 30 ? sig.slice(0, 27) + '...' : sig; }

function survivalClass(status) {
  switch(status) {
    case 'thriving': return 'survival-thriving';
    case 'stable': return 'survival-stable';
    case 'struggling': return 'survival-struggling';
    case 'bankrupt': return 'survival-bankrupt';
    default: return '';
  }
}

function survivalEmoji(status) {
  switch(status) {
    case 'thriving': return '💪';
    case 'stable': return '👍';
    case 'struggling': return '⚠️';
    case 'bankrupt': return '💀';
    default: return '❓';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// API Check
// ============================================================
async function checkAPI() {
  try {
    const res = await fetch(API_BASE + '/api/health');
    const data = await res.json();
    $('apiStatusDot').className = 'status-dot';
    $('apiStatusText').textContent = '✅ ' + data.service + ' v' + data.version;
  } catch(e) {
    $('apiStatusDot').className = 'status-dot error';
    $('apiStatusText').textContent = '❌ 无法连接';
  }
}

// ============================================================
// Stats & Leaderboard
// ============================================================
async function loadDashboard() {
  try {
    const res = await fetch(API_BASE + '/api/leaderboard');
    const data = await res.json();
    const agents = data.agents || [];

    // Stats
    $('agentCount').textContent = agents.length;
    $('agentCountBadge').textContent = agents.length + ' agents';
    const totalBal = agents.reduce((s, a) => s + (a.current_balance || 0), 0);
    const totalCost = agents.reduce((s, a) => s + (a.total_token_cost || 0), 0);
    $('totalBalance').textContent = formatCurrency(totalBal);
    $('totalTokenCost').textContent = formatCurrency(totalCost);

    // Task pool size from first agent
    if (agents.length > 0 && agents[0].num_tasks !== undefined) {
      // estimate pool from leaderboard
    }

    // Leaderboard table
    if (agents.length === 0) {
      $('leaderboardContent').innerHTML = '<div class="error-message">暂无数据</div>';
      return;
    }

    let html = '<table><thead><tr><th>排名</th><th>Agent</th><th>余额</th><th>净资产</th><th>变化</th><th>任务数</th><th>评分</th><th>成本</th><th>状态</th></tr></thead><tbody>';
    agents.forEach((a, i) => {
      const pctClass = (a.pct_change || 0) >= 0 ? 'green' : 'red';
      const evalScore = a.avg_eval_score !== null && a.avg_eval_score !== undefined ? a.avg_eval_score.toFixed(2) : '--';
      html += `<tr onclick="openAgentDetail('${escapeHtml(a.signature)}')" style="cursor:pointer;">
        <td>#${i + 1}</td>
        <td><strong>${escapeHtml(shortSig(a.signature))}</strong></td>
        <td style="color:var(--green)">${formatCurrency(a.current_balance)}</td>
        <td>${formatCurrency(a.net_worth)}</td>
        <td class="${pctClass}">${(a.pct_change || 0) >= 0 ? '+' : ''}${(a.pct_change || 0).toFixed(1)}%</td>
        <td>${a.num_tasks || 0}</td>
        <td>${evalScore}</td>
        <td>${formatCurrency(a.total_token_cost)}</td>
        <td class="${survivalClass(a.survival_status)}">${survivalEmoji(a.survival_status)} ${a.survival_status}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    $('leaderboardContent').innerHTML = html;

    // Also load task pool size
    loadTaskPoolSize();

  } catch(e) {
    $('leaderboardContent').innerHTML = '<div class="error-message">加载失败: ' + e.message + '</div>';
  }
}

async function loadTaskPoolSize() {
  try {
    const res = await fetch(API_BASE + '/api/agents');
    const data = await res.json();
    const agents = data.agents || [];
    if (agents.length > 0) {
      const sig = agents[0].signature;
      const tres = await fetch(API_BASE + '/api/agents/' + encodeURIComponent(sig) + '/tasks');
      const tdata = await tres.json();
      if (tdata.pool_size) {
        $('taskPoolSize').textContent = tdata.pool_size;
      }
    }
  } catch(e) {
    console.log('Could not load pool size:', e.message);
  }
}

// ============================================================
// Tab switching
// ============================================================
function switchTab(btn, tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  $('tab-' + tabName).classList.add('active');

  // Lazy load
  if (tabName === 'tasks' && !$('tab-tasks').dataset.loaded) loadAllTasks();
  if (tabName === 'artifacts' && !$('tab-artifacts').dataset.loaded) loadArtifacts();
}

function switchDetailTab(btn, tabName) {
  document.querySelectorAll('#detailTabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#detailContent .tab-content').forEach(t => t.classList.remove('active'));
  $('detail-tab-' + tabName).classList.add('active');
}

// ============================================================
// Agent Detail
// ============================================================
let currentAgentSig = null;

function openAgentDetail(signature) {
  currentAgentSig = signature;
  $('agentDetailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  loadAgentOverview(signature);
  loadAgentTasks(signature);
  loadAgentEconomic(signature);
  loadAgentLearning(signature);
}

function closeAgentDetail() {
  $('agentDetailOverlay').classList.remove('open');
  document.body.style.overflow = '';
  currentAgentSig = null;
}

async function loadAgentOverview(sig) {
  try {
    const res = await fetch(API_BASE + '/api/agents/' + encodeURIComponent(sig));
    const data = await res.json();
    $('detailName').textContent = '🤖 ' + sig;
    const s = data.current_status || {};
    $('detailStatusRow').innerHTML = `
      <span>💰 余额: <strong style="color:var(--green)">${formatCurrency(s.balance)}</strong></span>
      <span>📈 净资产: <strong>${formatCurrency(s.net_worth)}</strong></span>
      <span>💸 Token 成本: <strong style="color:var(--orange)">${formatCurrency(s.total_token_cost)}</strong></span>
      <span>🏆 任务数: <strong>${s.num_evaluations || 0}</strong></span>
      <span>📊 评分: <strong>${s.avg_evaluation_score !== null && s.avg_evaluation_score !== undefined ? s.avg_evaluation_score.toFixed(2) : '--'}</strong></span>

async function loadAgentEconomic(sig) {
  try {
    const res = await fetch(API_BASE + '/api/agents/' + encodeURIComponent(sig) + '/economic');
    const data = await res.json();

    if (!data.dates || data.dates.length === 0) {
      $('detail-tab-economic').innerHTML = '<div class="error-message">暂无经济数据</div>';
      return;
    }

    const maxBal = Math.max(...data.balance_history.map(Math.abs), 1);
    const maxCost = Math.max(...data.token_costs.map(Math.abs), 1);
    const dates = data.dates.slice(-30);
    const bals = data.balance_history.slice(-30);
    const costs = data.token_costs.slice(-30);

    let html = `<div class="detail-grid">
      <div class="chart-container">
        <h3>💰 余额历史（近30天）</h3>
        <div class="bar-chart">`;
    bals.forEach((b, i) => {
      const pct = Math.max((b / maxBal) * 100, 2);
      const color = b >= 0 ? 'var(--green)' : 'var(--red)';
      html += `<div class="bar" style="height:${pct}%;background:${color};" title="${dates[i]}: ${formatCurrency(b)}">
        <div class="bar-tooltip">${dates[i]}: ${formatCurrency(b)}</div>
      </div>`;
    });
    html += `</div></div>
      <div class="chart-container">
        <h3>💸 Token 成本（近30天）</h3>
        <div class="bar-chart">`;
    costs.forEach((c, i) => {
      const pct = Math.max((Math.abs(c) / maxCost) * 100, 2);
      html += `<div class="bar" style="height:${pct}%;background:var(--orange);" title="${dates[i]}: ${formatCurrency(c)}">
        <div class="bar-tooltip">${dates[i]}: ${formatCurrency(c)}</div>
      </div>`;
    });
    html += `</div></div>
    </div>
    <div style="padding:16px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div><strong>总余额</strong><br><span style="color:var(--green);font-size:18px;">${formatCurrency(data.balance)}</span></div>
      <div><strong>总 Token 成本</strong><br><span style="color:var(--orange);font-size:18px;">${formatCurrency(data.total_token_cost)}</span></div>
      <div><strong>总工作收入</strong><br><span style="color:var(--green);font-size:18px;">${formatCurrency(data.total_work_income)}</span></div>
      <div><strong>净资产</strong><br><span style="font-size:18px;">${formatCurrency(data.net_worth)}</span></div>
    </div>`;
    $('detail-tab-economic').innerHTML = html;

  } catch(e) {
    $('detail-tab-economic').innerHTML = '<div class="error-message">加载失败: ' + e.message + '</div>';

async function submitTask() {
  const prompt = $('taskPrompt').value.trim();
  if (!prompt) { alert('请输入任务描述'); return; }

  const body = {
    prompt: prompt,
    occupation: $('taskOccupation').value || 'Software Engineer',
    sector: 'Technology',
    max_payment: parseFloat($('taskMaxPayment').value) || 50,
  };
  const agent = $('taskAgent').value.trim();
  if (agent) body.agent = agent;

  const resultDiv = $('taskResult');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '<div class="loading">⏳ 提交中...</div>';

  try {
    const res = await fetch(API_BASE + '/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    resultDiv.innerHTML = `<div style="padding:16px;background:rgba(63,185,80,0.1);border:1px solid var(--green);border-radius:8px;">
      ✅ <strong>任务已提交</strong><br>
      Task ID: <code>${escapeHtml(data.task_id)}</code><br>
      Agent: ${escapeHtml(data.agent)}<br>
      状态: ${data.status}<br>
      消息: ${escapeHtml(data.message || '')}
    </div>`;
  } catch(e) {
    resultDiv.innerHTML = `<div style="padding:16px;background:rgba(248,81,73,0.1);border:1px solid var(--red);border-radius:8px;">
      ❌ 提交失败: ${escapeHtml(e.message)}
    </div>`;
  }
}

// ============================================================
// WebSocket Stream
// ============================================================
let ws = null;
let streamBuffer = [];

function connectWS() {
  if (ws) ws.close();
  try {
    ws = new WebSocket(WS_BASE + '/ws');
    ws.onopen = () => {
      $('wsIndicator').className = 'ws-indicator';
      $('wsIndicator').innerHTML = '● 实时连接';
      $('wsTabIndicator').className = 'ws-indicator';
      $('wsTabIndicator').innerHTML = '● WebSocket 已连接';
      addStreamEntry('system', '🟢 WebSocket 已连接');
    };
    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        addStreamEntry(msg.type || 'message', msg);
      } catch(e) {
        addStreamEntry('message', { data: event.data });
      }
    };
    ws.onclose = () => {
      $('wsIndicator').className = 'ws-indicator disconnected';
      $('wsIndicator').innerHTML = '● 已断开';
      $('wsTabIndicator').className = 'ws-indicator disconnected';
      $('wsTabIndicator').innerHTML = '● 已断开';
      addStreamEntry('system', '🔴 WebSocket 已断开（3秒后重连）');
      setTimeout(connectWS, 3000);
    };
    ws.onerror = () => {
      addStreamEntry('system', '⚠️ WebSocket 错误');
    };
  } catch(e) {
    addStreamEntry('system', '❌ WebSocket 连接失败: ' + e.message);
  }
}

function addStreamEntry(type, data) {
  const ts = new Date().toLocaleTimeString();
  let html = '';
  if (type === 'system') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> ${data}`;
  } else if (type === 'connected') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> <span style="color:var(--green)">${escapeHtml(data.message || '已连接')}</span>`;
  } else if (type === 'heartbeat') {
    // skip heartbeat
    return;
  } else if (type === 'balance_update') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> 💰 <strong>${escapeHtml(data.signature || '?')}</strong> 余额更新: <span style="color:var(--green)">${formatCurrency(data.data?.balance)}</span>`;
  } else if (type === 'activity_update') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> 📊 <strong>${escapeHtml(data.signature || '?')}</strong> 活动: ${escapeHtml(data.data?.activity || '')} (${escapeHtml(data.data?.date || '')})`;
  } else if (type === 'agent_thinking') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> 🤔 <strong>${escapeHtml(data.signature || '?')}</strong> 思考: ${escapeHtml(data.message || data.data || '')}`;
  } else if (type === 'work_submitted') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> 📝 <strong>${escapeHtml(data.signature || '?')}</strong> 提交工作`;
  } else if (type === 'task_completed') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> ✅ <strong>${escapeHtml(data.signature || '?')}</strong> 任务完成`;
  } else if (type === 'task_error') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> ❌ <strong>${escapeHtml(data.signature || '?')}</strong> 任务错误: ${escapeHtml(data.message || data.error || '')}`;
  } else if (type === 'code_generated') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> 💻 <strong>${escapeHtml(data.signature || '?')}</strong> 生成代码`;
  } else if (type === 'artifact_created') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> 📎 <strong>${escapeHtml(data.signature || '?')}</strong> 创建作品: ${escapeHtml(data.filename || data.message || '')}`;
  } else if (type === 'subscribed') {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> 📡 ${escapeHtml(data.message || '订阅成功')}`;
  } else {
    html = `<span style="color:var(--text-secondary)">[${ts}]</span> <span style="color:var(--yellow)">[${type}]</span> ${escapeHtml(JSON.stringify(data))}`;
  }

  streamBuffer.push(html);
  if (streamBuffer.length > 200) streamBuffer.shift();

  const container = $('streamContent');
  container.innerHTML = streamBuffer.map(h => `<div class="log-entry">${h}</div>`).join('');
  container.scrollTop = container.scrollHeight;
}

// Depth Configuration (2层/5层)

async function loadDepth() {
  try {
    const res = await fetch(API_BASE + '/api/config/depth');
    const data = await res.json();
    const depth = data.depth || 5;
    updateDepthUI(depth);
  } catch(e) {
    console.log('Could not load depth config:', e.message);
  }
}

async function setDepth(depth) {
  try {
    const res = await fetch(API_BASE + '/api/config/depth', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ depth: depth }),
    });
    const data = await res.json();
    if (data.saved) {
      updateDepthUI(depth);
      addStreamEntry('system', `🧩 拆解层级已切换为 ${depth} 层`);
    }
  } catch(e) {
    console.log('Could not set depth:', e.message);
  }
}

function updateDepthUI(depth) {
  const btn2 = $('depthBtn2');
  const btn5 = $('depthBtn5');
  if (depth === 2) {
    btn2.style.borderColor = 'var(--accent)';
    btn2.style.background = 'rgba(88,166,255,0.15)';
    btn2.style.color = 'var(--accent)';
    btn2.style.fontWeight = '600';
    btn5.style.borderColor = 'var(--border)';
    btn5.style.background = 'var(--bg)';
    btn5.style.color = 'var(--text-secondary)';
    btn5.style.fontWeight = 'normal';
  } else {
    btn5.style.borderColor = 'var(--accent)';
    btn5.style.background = 'rgba(88,166,255,0.15)';
    btn5.style.color = 'var(--accent)';
    btn5.style.fontWeight = '600';
    btn2.style.borderColor = 'var(--border)';
    btn2.style.background = 'var(--bg)';
    btn2.style.color = 'var(--text-secondary)';
    btn2.style.fontWeight = 'normal';
  }
}
